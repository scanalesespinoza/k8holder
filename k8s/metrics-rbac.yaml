apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8holder-metrics-reader
rules:
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods", "nodes"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8holder-metrics-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8holder-metrics-reader
subjects:
- kind: ServiceAccount
  name: default
  namespace: k8holder
