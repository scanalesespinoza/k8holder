---
# K8HOLDER - Complete Installation Manifest
# Apply with: oc apply -f k8s/install-all-in-one.yaml

# 1. BuildConfig - Builds container image from source
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: k8holder
  namespace: k8holder
  labels:
    app: k8holder
spec:
  output:
    to:
      kind: ImageStreamTag
      name: k8holder:latest
  source:
    type: Binary
    binary: {}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  triggers: []

---
# 2. ImageStream - Stores built container images
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: k8holder
  namespace: k8holder
  labels:
    app: k8holder

---
# 3. Deployment - Runs the application
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8holder
  namespace: k8holder
  labels:
    app: k8holder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8holder
  template:
    metadata:
      labels:
        app: k8holder
    spec:
      serviceAccountName: default
      containers:
      - name: k8holder
        image: image-registry.openshift-image-registry.svc:5000/k8holder/k8holder:latest
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "8080"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5

---
# 4. Service - Internal networking
apiVersion: v1
kind: Service
metadata:
  name: k8holder
  namespace: k8holder
  labels:
    app: k8holder
spec:
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: k8holder
  type: ClusterIP

---
# 5. Route - External access
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: k8holder
  namespace: k8holder
  labels:
    app: k8holder
spec:
  to:
    kind: Service
    name: k8holder
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

---
# 6. ClusterRole - Permissions to read cluster resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8holder-cluster-reader
rules:
- apiGroups: [""]
  resources: ["nodes", "pods", "services", "namespaces", "persistentvolumeclaims", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["route.openshift.io"]
  resources: ["routes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods", "nodes"]
  verbs: ["get", "list"]

---
# 7. ClusterRoleBinding - Grant permissions to k8holder ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8holder-cluster-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8holder-cluster-reader
subjects:
- kind: ServiceAccount
  name: default
  namespace: k8holder
