---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8holder
  namespace: k8holder
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8holder
rules:
- apiGroups: [""]
  resources:
    - pods
    - pods/log
    - services
    - namespaces
    - nodes
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources:
    - deployments
    - replicasets
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources:
    - pods
    - nodes
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8holder
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8holder
subjects:
- kind: ServiceAccount
  name: k8holder
  namespace: k8holder
