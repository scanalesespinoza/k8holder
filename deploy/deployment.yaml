apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8holder
  namespace: k8holder
  labels:
    app: k8holder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8holder
  template:
    metadata:
      labels:
        app: k8holder
    spec:
      serviceAccountName: k8holder
      containers:
      - name: backend
        image: image-registry.openshift-image-registry.svc:5000/k8holder/k8holder:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "8080"
        - name: NODE_ENV
          value: "production"
        - name: CORRELATION_HEADER
          value: "x-request-id"
        - name: CACHE_TTL
          value: "30"
        # Namespaces to monitor (comma-separated, empty = all)
        - name: NAMESPACES
          value: ""
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
