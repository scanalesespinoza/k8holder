apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: k8holder-metrics
  namespace: k8holder
  labels:
    app: k8holder
    # Required label for OpenShift monitoring to discover this ServiceMonitor
    openshift.io/cluster-monitoring: "true"
spec:
  selector:
    matchLabels:
      app: k8holder
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    scheme: http
    # Optional: relabeling for better metric organization
    relabelings:
    - sourceLabels: [__meta_kubernetes_pod_name]
      targetLabel: pod
    - sourceLabels: [__meta_kubernetes_namespace]
      targetLabel: namespace
    - sourceLabels: [__meta_kubernetes_pod_node_name]
      targetLabel: node
