apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: k8holder-network-policy
  namespace: k8holder
  labels:
    app: k8holder
spec:
  podSelector:
    matchLabels:
      app: k8holder
  policyTypes:
  - Ingress
  - Egress

  ingress:
  # Allow all ingress (pod is behind OpenShift Router with TLS)
  - {}

  egress:
  # Allow all egress (required for K8s API, DNS, metrics-server, etc.)
  # More restrictive policies can be added after verifying specific endpoints
  - {}
