apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: k8holder-hpa
  namespace: k8holder
  labels:
    app: k8holder
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: k8holder
  minReplicas: 1
  maxReplicas: 3
  metrics:
  # CPU-based scaling
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  # Memory-based scaling
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 min before scaling down
      policies:
      - type: Percent
        value: 50  # Scale down max 50% of pods at a time
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0  # Scale up immediately
      policies:
      - type: Percent
        value: 100  # Can double pods at a time
        periodSeconds: 60
      - type: Pods
        value: 2  # Or add max 2 pods at a time
        periodSeconds: 60
      selectPolicy: Max  # Use the policy that scales up most
